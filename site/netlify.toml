[build]
  publish = "."

[[redirects]]
  from = "/prototype"
  to = "https://prototype.gotovasl.com"
  status = 301

[[redirects]]
  from = "/demo"
  to = "https://demo.gotovasl.com"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
